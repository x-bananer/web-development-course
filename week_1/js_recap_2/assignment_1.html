	<body>
		<h1>Assignment 1. Fruits and vegs</h1>
		<p>Open the console to see the results.</p>

		<script>
			let fruits = ['apple', 'banana', 'orange', 'grape', 'kiwi'];

			console.log('The contents of the fruits:', fruits);
			console.log('The length of the fruits:', fruits.length);
			console.log('The element at index 2 in the fruits: ', fruits[2]);
			console.log('The last element in the fruits:', fruits[fruits.length - 1]);

			let vegetables = [];

			let veg1 = prompt('Enter a vegetable:');
			vegetables.push(veg1);

			let veg2 = prompt('Enter second vegetable:');
			vegetables.push(veg2);

			let veg3 = prompt('Enter third vegetable:');
			vegetables.push(veg3);

			console.log('The contents of the vegetables:', vegetables);
			console.log('The length of the vegetables:', vegetables.length);
		</script>
	</body>

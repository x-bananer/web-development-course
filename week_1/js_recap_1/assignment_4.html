<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Assignment 4. Grades</title>
	</head>
	<body>
		<h1>Assignment 4. Grades</h1>
		<p id="result"></p>

		<script>
			let score = Number(prompt('Enter your score:'));
			let grade;

			if (score >= 0 && score <= 39) {
				grade = 0;
			} else if (score <= 51) {
				grade = 1;
			} else if (score <= 63) {
				grade = 2;
			} else if (score <= 75) {
				grade = 3;
			} else if (score <= 87) {
				grade = 4;
			} else if (score <= 100) {
				grade = 5;
			} else {
				grade = 'Unknown grade';
			}

			document.getElementById('result').textContent = `Score ${score}, grade ${grade}.`;
		</script>
	</body>
</html>
